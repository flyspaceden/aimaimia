name: Deploy All Sites

on:
  push:
    branches: [main]
    paths:
      - 'website/**'
      - 'admin/**'
      - 'seller/**'

  # 手动触发
  workflow_dispatch:
    inputs:
      deploy_target:
        description: '部署目标 (all/website/admin/seller)'
        required: true
        default: 'all'

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      website: ${{ steps.changes.outputs.website }}
      admin: ${{ steps.changes.outputs.admin }}
      seller: ${{ steps.changes.outputs.seller }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed paths
        id: changes
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TARGET="${{ github.event.inputs.deploy_target }}"
            if [ "$TARGET" = "all" ] || [ "$TARGET" = "website" ]; then echo "website=true" >> $GITHUB_OUTPUT; else echo "website=false" >> $GITHUB_OUTPUT; fi
            if [ "$TARGET" = "all" ] || [ "$TARGET" = "admin" ]; then echo "admin=true" >> $GITHUB_OUTPUT; else echo "admin=false" >> $GITHUB_OUTPUT; fi
            if [ "$TARGET" = "all" ] || [ "$TARGET" = "seller" ]; then echo "seller=true" >> $GITHUB_OUTPUT; else echo "seller=false" >> $GITHUB_OUTPUT; fi
          else
            echo "website=$(git diff --name-only HEAD~1 HEAD | grep -q '^website/' && echo true || echo false)" >> $GITHUB_OUTPUT
            echo "admin=$(git diff --name-only HEAD~1 HEAD | grep -q '^admin/' && echo true || echo false)" >> $GITHUB_OUTPUT
            echo "seller=$(git diff --name-only HEAD~1 HEAD | grep -q '^seller/' && echo true || echo false)" >> $GITHUB_OUTPUT
          fi

  deploy-website:
    needs: detect-changes
    if: needs.detect-changes.outputs.website == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: website/package-lock.json

      - name: Build website
        run: |
          cd website
          npm ci
          npm run build

      - name: Deploy to server
        uses: easingthemes/ssh-deploy@v4
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SERVER_SSH_KEY }}
          REMOTE_HOST: ${{ secrets.SERVER_HOST }}
          REMOTE_USER: ${{ secrets.SERVER_USER }}
          SOURCE: website/dist/
          TARGET: /www/wwwroot/website/
          ARGS: -avz --delete --exclude='.htaccess' --exclude='.user.ini' --exclude='404.html'

  deploy-admin:
    needs: detect-changes
    if: needs.detect-changes.outputs.admin == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: admin/package-lock.json

      - name: Build admin
        run: |
          cd admin
          npm ci
          npm run build

      - name: Deploy to server
        uses: easingthemes/ssh-deploy@v4
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SERVER_SSH_KEY }}
          REMOTE_HOST: ${{ secrets.SERVER_HOST }}
          REMOTE_USER: ${{ secrets.SERVER_USER }}
          SOURCE: admin/dist/
          TARGET: /www/wwwroot/admin/
          ARGS: -avz --delete --exclude='.htaccess' --exclude='.user.ini' --exclude='404.html'

  deploy-seller:
    needs: detect-changes
    if: needs.detect-changes.outputs.seller == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: seller/package-lock.json

      - name: Build seller
        run: |
          cd seller
          npm ci
          npm run build

      - name: Deploy to server
        uses: easingthemes/ssh-deploy@v4
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SERVER_SSH_KEY }}
          REMOTE_HOST: ${{ secrets.SERVER_HOST }}
          REMOTE_USER: ${{ secrets.SERVER_USER }}
          SOURCE: seller/dist/
          TARGET: /www/wwwroot/seller/
          ARGS: -avz --delete --exclude='.htaccess' --exclude='.user.ini' --exclude='404.html'
