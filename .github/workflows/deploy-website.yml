name: Deploy Sites & Backend

on:
  push:
    branches: [main, staging]
    paths:
      - 'website/**'
      - 'admin/**'
      - 'seller/**'
      - 'backend/**'
      - 'huahai-corporate-site/**'
      - '.github/workflows/deploy-website.yml'

  # 手动触发
  workflow_dispatch:
    inputs:
      deploy_target:
        description: '部署目标 (all/website/admin/seller/backend/huahai)'
        required: true
        default: 'all'

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      website: ${{ steps.changes.outputs.website }}
      admin: ${{ steps.changes.outputs.admin }}
      seller: ${{ steps.changes.outputs.seller }}
      backend: ${{ steps.changes.outputs.backend }}
      huahai: ${{ steps.changes.outputs.huahai }}
      env_name: ${{ steps.env.outputs.env_name }}
      api_base: ${{ steps.env.outputs.api_base }}
      ws_base: ${{ steps.env.outputs.ws_base }}
      admin_target: ${{ steps.env.outputs.admin_target }}
      seller_target: ${{ steps.env.outputs.seller_target }}
      website_target: ${{ steps.env.outputs.website_target }}
      backend_src_dir: ${{ steps.env.outputs.backend_src_dir }}
      backend_pm2_name: ${{ steps.env.outputs.backend_pm2_name }}
      backend_branch: ${{ steps.env.outputs.backend_branch }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed paths
        id: changes
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TARGET="${{ github.event.inputs.deploy_target }}"
            [ "$TARGET" = "all" ] || [ "$TARGET" = "website" ] && echo "website=true" >> $GITHUB_OUTPUT || echo "website=false" >> $GITHUB_OUTPUT
            [ "$TARGET" = "all" ] || [ "$TARGET" = "admin" ]   && echo "admin=true"   >> $GITHUB_OUTPUT || echo "admin=false"   >> $GITHUB_OUTPUT
            [ "$TARGET" = "all" ] || [ "$TARGET" = "seller" ]  && echo "seller=true"  >> $GITHUB_OUTPUT || echo "seller=false"  >> $GITHUB_OUTPUT
            [ "$TARGET" = "all" ] || [ "$TARGET" = "backend" ] && echo "backend=true" >> $GITHUB_OUTPUT || echo "backend=false" >> $GITHUB_OUTPUT
            [ "$TARGET" = "all" ] || [ "$TARGET" = "huahai" ]  && echo "huahai=true"  >> $GITHUB_OUTPUT || echo "huahai=false"  >> $GITHUB_OUTPUT
          else
            CHANGED=$(git diff --name-only HEAD~1 HEAD)
            echo "$CHANGED" | grep -q '^website/' && echo "website=true" >> $GITHUB_OUTPUT || echo "website=false" >> $GITHUB_OUTPUT
            echo "$CHANGED" | grep -q '^admin/'   && echo "admin=true"   >> $GITHUB_OUTPUT || echo "admin=false"   >> $GITHUB_OUTPUT
            echo "$CHANGED" | grep -q '^seller/'  && echo "seller=true"  >> $GITHUB_OUTPUT || echo "seller=false"  >> $GITHUB_OUTPUT
            echo "$CHANGED" | grep -q '^backend/' && echo "backend=true" >> $GITHUB_OUTPUT || echo "backend=false" >> $GITHUB_OUTPUT
            echo "$CHANGED" | grep -q '^huahai-corporate-site/' && echo "huahai=true" >> $GITHUB_OUTPUT || echo "huahai=false" >> $GITHUB_OUTPUT
          fi

      - name: Determine environment (main → 生产 / staging → 测试)
        id: env
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "env_name=production" >> $GITHUB_OUTPUT
            echo "api_base=https://api.ai-maimai.com/api/v1" >> $GITHUB_OUTPUT
            echo "ws_base=https://api.ai-maimai.com" >> $GITHUB_OUTPUT
            echo "admin_target=/www/wwwroot/admin/" >> $GITHUB_OUTPUT
            echo "seller_target=/www/wwwroot/seller/" >> $GITHUB_OUTPUT
            echo "website_target=/www/wwwroot/website/" >> $GITHUB_OUTPUT
            echo "backend_src_dir=/www/wwwroot/aimaimai-prod-src" >> $GITHUB_OUTPUT
            echo "backend_pm2_name=aimaimai-api-prod" >> $GITHUB_OUTPUT
            echo "backend_branch=main" >> $GITHUB_OUTPUT
          else
            echo "env_name=staging" >> $GITHUB_OUTPUT
            echo "api_base=https://test-api.ai-maimai.com/api/v1" >> $GITHUB_OUTPUT
            echo "ws_base=https://test-api.ai-maimai.com" >> $GITHUB_OUTPUT
            echo "admin_target=/www/wwwroot/test-admin/" >> $GITHUB_OUTPUT
            echo "seller_target=/www/wwwroot/test-seller/" >> $GITHUB_OUTPUT
            echo "website_target=/www/wwwroot/website/" >> $GITHUB_OUTPUT
            echo "backend_src_dir=/www/wwwroot/aimaimai-staging-src" >> $GITHUB_OUTPUT
            echo "backend_pm2_name=aimaimai-api-test" >> $GITHUB_OUTPUT
            echo "backend_branch=staging" >> $GITHUB_OUTPUT
          fi

  deploy-website:
    needs: detect-changes
    if: needs.detect-changes.outputs.website == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: website/package-lock.json

      # ⚠️ 过渡方案（2026-04-22）：website 暴露在 main 但 backend 仅部署到 staging 服务器（port 3001 = test-api），
      # 生产 api.ai-maimai.com 无上游 → 502。把 website build 固定指向 test-api 让公网验证码等功能可用。
      # 部署生产 backend 后必须改回：VITE_API_BASE_URL: ${{ needs.detect-changes.outputs.api_base }}
      # 收尾 checklist 见 plan.md C40。
      - name: Build website
        env:
          VITE_API_BASE_URL: https://test-api.ai-maimai.com/api/v1
          VITE_APP_ENV: ${{ needs.detect-changes.outputs.env_name }}
        run: |
          cd website
          npm ci
          npm run build

      - name: Deploy to server
        uses: easingthemes/ssh-deploy@v4
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SERVER_SSH_KEY }}
          REMOTE_HOST: ${{ secrets.SERVER_HOST }}
          REMOTE_USER: ${{ secrets.SERVER_USER }}
          SOURCE: website/dist/
          TARGET: ${{ needs.detect-changes.outputs.website_target }}
          ARGS: -avz --delete --exclude='.htaccess' --exclude='.user.ini' --exclude='404.html'

  deploy-admin:
    needs: detect-changes
    if: needs.detect-changes.outputs.admin == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: admin/package-lock.json

      - name: Build admin
        env:
          VITE_API_BASE_URL: ${{ needs.detect-changes.outputs.api_base }}
          VITE_WS_BASE_URL: ${{ needs.detect-changes.outputs.ws_base }}
          VITE_APP_ENV: ${{ needs.detect-changes.outputs.env_name }}
        run: |
          cd admin
          npm ci
          npm run build

      - name: Deploy to server
        uses: easingthemes/ssh-deploy@v4
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SERVER_SSH_KEY }}
          REMOTE_HOST: ${{ secrets.SERVER_HOST }}
          REMOTE_USER: ${{ secrets.SERVER_USER }}
          SOURCE: admin/dist/
          TARGET: ${{ needs.detect-changes.outputs.admin_target }}
          ARGS: -avz --delete --exclude='.htaccess' --exclude='.user.ini' --exclude='404.html'

  deploy-seller:
    needs: detect-changes
    if: needs.detect-changes.outputs.seller == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: seller/package-lock.json

      - name: Build seller
        env:
          VITE_API_BASE_URL: ${{ needs.detect-changes.outputs.api_base }}
          VITE_WS_BASE_URL: ${{ needs.detect-changes.outputs.ws_base }}
          VITE_APP_ENV: ${{ needs.detect-changes.outputs.env_name }}
        run: |
          cd seller
          npm ci
          npm run build

      - name: Deploy to server
        uses: easingthemes/ssh-deploy@v4
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SERVER_SSH_KEY }}
          REMOTE_HOST: ${{ secrets.SERVER_HOST }}
          REMOTE_USER: ${{ secrets.SERVER_USER }}
          SOURCE: seller/dist/
          TARGET: ${{ needs.detect-changes.outputs.seller_target }}
          ARGS: -avz --delete --exclude='.htaccess' --exclude='.user.ini' --exclude='404.html'

  deploy-backend:
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SERVER_SSH_KEY }}

      - name: Add server to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy backend on server
        env:
          SRC_DIR: ${{ needs.detect-changes.outputs.backend_src_dir }}
          PM2_NAME: ${{ needs.detect-changes.outputs.backend_pm2_name }}
          BRANCH: ${{ needs.detect-changes.outputs.backend_branch }}
        run: |
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} bash <<EOF
            set -e
            echo "═══ 1. 切换到源码目录 ═══"
            cd $SRC_DIR

            echo "═══ 2. 拉取最新代码（branch: $BRANCH）═══"
            git fetch origin $BRANCH
            git reset --hard origin/$BRANCH

            echo "═══ 3. 装依赖 ═══"
            cd backend
            npm ci

            echo "═══ 4. Prisma generate + migrate deploy ═══"
            npx prisma generate
            npx prisma migrate deploy

            echo "═══ 5. 构建 ═══"
            npm run build

            echo "═══ 6. PM2 reload ═══"
            pm2 reload $PM2_NAME --update-env

            echo "═══ 7. 验证健康检查 ═══"
            sleep 3
            pm2 list | grep $PM2_NAME

            echo "✅ 后端部署完成"
          EOF

  # 华海农科母公司官网（静态 HTML，只在 main 分支部署到生产）
  deploy-huahai:
    needs: detect-changes
    if: needs.detect-changes.outputs.huahai == 'true' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy huahai corporate site
        uses: easingthemes/ssh-deploy@v4
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SERVER_SSH_KEY }}
          REMOTE_HOST: ${{ secrets.SERVER_HOST }}
          REMOTE_USER: ${{ secrets.SERVER_USER }}
          SOURCE: huahai-corporate-site/
          TARGET: /www/wwwroot/huahainongke.com/
          ARGS: -avz --delete --exclude='.htaccess' --exclude='.user.ini' --exclude='404.html'
