<h2>VoiceOverlay 两种状态</h2>
<p class="subtitle">非首页场景：右下角 AI 按钮触发录音后的 UI</p>

<div class="cards">
  <!-- State 1: Recording -->
  <div class="card" data-choice="recording" onclick="toggleSelect(this)">
    <div class="card-image" style="background:#0a1a0a; padding:20px; min-height:360px; position:relative; overflow:hidden; border-radius:12px 12px 0 0;">
      <!-- Simulated page content behind -->
      <div style="opacity:0.3;">
        <div style="background:#1a2e1a; height:44px; border-radius:8px; margin-bottom:12px; display:flex; align-items:center; padding:0 12px;">
          <span style="color:#6a9a6a; font-size:13px;">← 商品详情</span>
        </div>
        <div style="background:#1a2e1a; height:180px; border-radius:8px; margin-bottom:12px;"></div>
        <div style="background:#1a2e1a; height:16px; border-radius:4px; width:60%; margin-bottom:8px;"></div>
        <div style="background:#1a2e1a; height:16px; border-radius:4px; width:40%;"></div>
      </div>

      <!-- Recording floating card -->
      <div style="position:absolute; bottom:80px; right:16px; background:linear-gradient(135deg, #1b3d1b, #0d260d); border:1px solid #2E7D32; border-radius:16px; padding:14px 18px; min-width:160px; box-shadow: 0 4px 20px rgba(46,125,50,0.3), 0 0 40px rgba(46,125,50,0.15);">
        <!-- Pulse ring -->
        <div style="position:absolute; inset:-6px; border-radius:22px; border:2px solid rgba(46,125,50,0.3); animation: pulse 1.5s infinite;"></div>

        <div style="display:flex; align-items:center; gap:10px; margin-bottom:8px;">
          <div style="width:28px; height:28px; border-radius:50%; background:linear-gradient(135deg, #2E7D32, #4CAF50); display:flex; align-items:center; justify-content:center;">
            <span style="color:white; font-size:14px;">🎤</span>
          </div>
          <span style="color:#81C784; font-size:14px; font-weight:600;">正在听...</span>
        </div>

        <!-- Waveform bars -->
        <div style="display:flex; align-items:center; gap:3px; height:20px; justify-content:center;">
          <div style="width:3px; background:#4CAF50; border-radius:2px; height:8px; animation: wave1 0.8s infinite;"></div>
          <div style="width:3px; background:#4CAF50; border-radius:2px; height:14px; animation: wave2 0.8s infinite;"></div>
          <div style="width:3px; background:#4CAF50; border-radius:2px; height:20px; animation: wave3 0.8s infinite;"></div>
          <div style="width:3px; background:#4CAF50; border-radius:2px; height:12px; animation: wave2 0.8s infinite;"></div>
          <div style="width:3px; background:#4CAF50; border-radius:2px; height:16px; animation: wave1 0.8s infinite;"></div>
          <div style="width:3px; background:#4CAF50; border-radius:2px; height:10px; animation: wave3 0.8s infinite;"></div>
          <div style="width:3px; background:#4CAF50; border-radius:2px; height:18px; animation: wave2 0.8s infinite;"></div>
        </div>

        <div style="color:rgba(129,199,132,0.6); font-size:11px; text-align:center; margin-top:6px;">松开结束</div>
      </div>

      <!-- AI FAB button (pressed state) -->
      <div style="position:absolute; bottom:20px; right:20px; width:48px; height:48px; border-radius:24px; background:linear-gradient(135deg, #1B5E20, #2E7D32); display:flex; align-items:center; justify-content:center; box-shadow: 0 0 20px rgba(46,125,50,0.5);">
        <span style="font-size:20px;">🌿</span>
      </div>
    </div>
    <div class="card-body">
      <h3>状态 1：录音中</h3>
      <p>悬浮卡片从按钮上方弹出，脉冲光晕 + 波形动画 + "松开结束"提示。不遮挡页面主体内容。</p>
    </div>
  </div>

  <!-- State 2: Feedback -->
  <div class="card" data-choice="feedback" onclick="toggleSelect(this)">
    <div class="card-image" style="background:#0a1a0a; padding:20px; min-height:360px; position:relative; overflow:hidden; border-radius:12px 12px 0 0;">
      <!-- Simulated page content behind (slightly dimmed) -->
      <div style="opacity:0.25;">
        <div style="background:#1a2e1a; height:44px; border-radius:8px; margin-bottom:12px; display:flex; align-items:center; padding:0 12px;">
          <span style="color:#6a9a6a; font-size:13px;">← 商品详情</span>
        </div>
        <div style="background:#1a2e1a; height:180px; border-radius:8px; margin-bottom:12px;"></div>
        <div style="background:#1a2e1a; height:16px; border-radius:4px; width:60%; margin-bottom:8px;"></div>
        <div style="background:#1a2e1a; height:16px; border-radius:4px; width:40%;"></div>
      </div>

      <!-- Feedback bottom overlay -->
      <div style="position:absolute; bottom:0; left:0; right:0; background:linear-gradient(to top, #0d1f0d 80%, transparent); padding:20px 16px 24px;">
        <!-- User transcript -->
        <div style="display:flex; align-items:flex-start; gap:8px; margin-bottom:12px;">
          <div style="width:6px; height:6px; border-radius:3px; background:#4CAF50; margin-top:6px; flex-shrink:0;"></div>
          <span style="color:rgba(255,255,255,0.5); font-size:12px;">"帮我找有机苹果"</span>
        </div>

        <!-- AI response -->
        <div style="background:linear-gradient(135deg, #1b3d1b, #142e14); border:1px solid rgba(46,125,50,0.3); border-radius:12px; padding:14px; margin-bottom:12px;">
          <div style="display:flex; align-items:center; gap:6px; margin-bottom:8px;">
            <div style="width:20px; height:20px; border-radius:10px; background:linear-gradient(135deg, #2E7D32, #4CAF50); display:flex; align-items:center; justify-content:center;">
              <span style="font-size:10px;">🌿</span>
            </div>
            <span style="color:#81C784; font-size:12px; font-weight:600;">AI 农管家</span>
          </div>
          <p style="color:#e0e0e0; font-size:13px; line-height:1.5; margin:0;">好的，正在为你搜索有机苹果商品...</p>
        </div>

        <!-- Action buttons -->
        <div style="display:flex; gap:8px;">
          <div style="flex:1; background:linear-gradient(135deg, #2E7D32, #1B5E20); border-radius:20px; padding:10px; text-align:center; cursor:pointer;">
            <span style="color:white; font-size:13px; font-weight:500;">🔍 去搜索</span>
          </div>
          <div style="background:rgba(46,125,50,0.15); border:1px solid rgba(46,125,50,0.3); border-radius:20px; padding:10px 16px; text-align:center; cursor:pointer;">
            <span style="color:#81C784; font-size:13px;">继续对话</span>
          </div>
        </div>
      </div>
    </div>
    <div class="card-body">
      <h3>状态 2：反馈浮层</h3>
      <p>底部半透明浮层：用户原话 + AI 回复 + 操作按钮。导航类有"去搜索/打开购物车"主按钮 + "继续对话"次按钮。3 秒后可自动收起或手动关闭。</p>
    </div>
  </div>
</div>

<style>
@keyframes pulse {
  0%, 100% { opacity: 0.3; transform: scale(1); }
  50% { opacity: 0.6; transform: scale(1.04); }
}
@keyframes wave1 {
  0%, 100% { height: 8px; }
  50% { height: 18px; }
}
@keyframes wave2 {
  0%, 100% { height: 14px; }
  50% { height: 6px; }
}
@keyframes wave3 {
  0%, 100% { height: 20px; }
  50% { height: 10px; }
}
</style>
